    {ai&&<span className="badge b-ai">AI</span>}

function RequirementsSection({reqKey}){
  const [filt,setFilt]=useState('all');
  const reqs=D.requirements[reqKey]||[];
  const filtered=useMemo(()=>{
    if(filt==='all') return reqs;
    if(filt==='ai')  return reqs.filter(r=>r.ai);
    return reqs.filter(r=>r.priority.toLowerCase()===filt);
  },[reqs,filt]);
  const rcColor=p=>p==='Must'?'var(--red)':p==='Should'?'var(--amber)':'var(--blue)';
  const counts={must:reqs.filter(r=>r.priority==='Must').length,should:reqs.filter(r=>r.priority==='Should').length,could:reqs.filter(r=>r.priority==='Could').length,ai:reqs.filter(r=>r.ai).length};
  return <div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,flexWrap:'wrap'}}>
      <h2 style={{marginBottom:0}}>Functional Requirements</h2>
      <div className="filt-row" style={{marginBottom:0}}>
        {[['all','All '+reqs.length],['must','Must '+counts.must],['should','Should '+counts.should],counts.could>0&&['could','Could '+counts.could],['ai','AI '+counts.ai]].filter(Boolean).map(([f,l])=>(
          <button key={f} className={`fbtn ${filt===f?'f-'+f:''}`} onClick={()=>setFilt(f)}>{l}</button>
        ))}
      </div>
    </div>
    <div className="req-grid">
      {filtered.map(req=>(
        <div key={req.id} className="rcard" style={{'--rc-col':req.ai?'var(--green)':rcColor(req.priority)}}>
          <div className="rcard-top">
            <div className="rcard-id">{req.id}</div>
            <div className="rcard-text">{req.text}</div>
            <div className="rcard-badges"><Badge priority={req.priority} ai={req.ai}/></div>
          </div>
        </div>
      ))}
    </div>
  </div>;
}

function TeamsBoard(){
  const {useCallback,useRef}=React;
  const defaultAssign=useMemo(()=>{
    // If DEFAULTS.assignments has entries, use those; otherwise auto-assign by team sizes [7,6,5,4,5,3]
    if(D.assignments&&Object.keys(D.assignments).length>0) return D.assignments;
    const a={};
    const sizes=[7,6,5,4,5,3];
    D.interns.forEach((intern,i)=>{
      let cumulative=0;
      for(let t=0;t<sizes.length;t++){
        cumulative+=sizes[t];
        if(i<cumulative){ a[intern.id]='team'+(t+1); break; }
      }
    });
    return a;
  },[]);
  const [editMode,setEditMode]=useState(false);
  const [copied,setCopied]=useState(false);
  const [assignments,setAssignments]=useState(()=>{
    try{ const s=localStorage.getItem('forge-assignments'); return s?JSON.parse(s):defaultAssign; }
    catch{ return defaultAssign; }
  });
  const [dragId,setDragId]=useState(null);
  const [overCol,setOverCol]=useState(null);

  const persist=useCallback((next)=>{
    setAssignments(next);
    try{ localStorage.setItem('forge-assignments',JSON.stringify(next)); }catch{}
  },[]);

  const internsByTeam=useMemo(()=>{
    const map={team1:[],team2:[],team3:[],team4:[],team5:[],team6:[]};
    D.interns.forEach(intern=>{ const t=assignments[intern.id]||'team1'; if(map[t])map[t].push(intern); });
    return map;
  },[assignments]);

  const onDragStart=(e,id)=>{ setDragId(id); e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',id); };
  const onDragEnd=()=>{ setDragId(null); setOverCol(null); };
  const onDrop=(e,tk)=>{
    e.preventDefault();
    const id=e.dataTransfer.getData('text/plain');
    if(id&&assignments[id]!==tk) persist({...assignments,[id]:tk});
    setDragId(null); setOverCol(null);
  };
  const reset=()=>persist(defaultAssign);

  const locCounts={Chennai:0,Bangalore:0,Hyderabad:0};
  D.interns.forEach(i=>{ if(locCounts[i.location]!==undefined) locCounts[i.location]++; });
  const tKeys=['team1','team2','team3','team4','team5','team6'];

  return <div className="board-wrap">
    <div className="board-topbar">
      <div>
        <div className="board-title">Intern Team Assignments</div>
        <div className="board-meta">{editMode?'Drag & drop cards to reassign engineers between teams':'Read-only · toggle Edit Mode to reassign'}</div>
      </div>
      <div className="board-stats">
        {Object.entries(locCounts).map(([loc,n])=>(
          <div className="bstat" key={loc}><span className="bstat-n" style={{color:LOC_COLORS[loc]}}>{n}</span><span className="bstat-l">{loc}</span></div>
        ))}
        <div style={{display:'flex',alignItems:'center',gap:8,marginLeft:8,padding:'5px 12px',borderRadius:6,background:'var(--bg3)',border:'1px solid var(--border2)',cursor:'pointer',userSelect:'none'}} onClick={()=>setEditMode(m=>!m)}>
          <span style={{fontSize:12,fontFamily:'var(--mono)',color:editMode?'var(--amber)':'var(--text3)'}}>Edit Mode</span>
          <div style={{width:28,height:16,borderRadius:99,background:editMode?'var(--amber)':'var(--bg4)',border:'1px solid var(--border2)',position:'relative',transition:'background .2s',flexShrink:0}}>
            <div style={{position:'absolute',top:2,left:2,width:10,height:10,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 3px rgba(0,0,0,.3)',transition:'transform .2s',transform:editMode?'translateX(12px)':'none'}}></div>
          </div>
        </div>
        {editMode&&<button className="reset-btn" onClick={reset}>↺ Reset</button>}
        {editMode&&<button className="reset-btn" style={{color:'var(--green)',borderColor:'rgba(134,239,172,.3)'}} onClick={()=>{
          const snippet=`assignments: ${JSON.stringify(assignments)},`;
          navigator.clipboard.writeText(snippet).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2500); });
        }}>{copied?'✓ Copied!':'📋 Copy assignments'}</button>}
      </div>
    </div>
    <div className="board-cols">
      {tKeys.map(tk=>{
        const m=TEAM_META[tk]; const members=internsByTeam[tk]||[];
        return <div key={tk}
          className={`board-col${editMode&&overCol===tk?' drag-over':''}`}
          style={{'--ch':m.color}}
          onDragOver={editMode?(e=>{e.preventDefault();setOverCol(tk);}):undefined}
          onDragLeave={editMode?(()=>setOverCol(null)):undefined}
          onDrop={editMode?(e=>onDrop(e,tk)):undefined}>
          <div className="col-hdr">
            <div className="col-num" style={{color:m.color,borderColor:m.color+'44',background:m.color+'15'}}>{m.num}</div>
            <div className="col-name-txt">{m.name}</div>
            <div className="col-cnt">{members.length} engineers</div>
          </div>
          <div className="col-cards">
            {members.map(intern=>(
              <div key={intern.id}
                className={`icard${editMode?' draggable':''}${dragId===intern.id?' dragging':''}`}
                draggable={editMode}
                onDragStart={editMode?(e=>onDragStart(e,intern.id)):undefined}
                onDragEnd={editMode?onDragEnd:undefined}>
                <div className="icard-name">{intern.name}</div>
                <span className="icard-loc"><span className="loc-dot" style={{background:LOC_COLORS[intern.location]||'var(--text3)'}}></span>{intern.location}</span>
              </div>
            ))}
            {editMode&&members.length===0&&(
              <div style={{border:'2px dashed var(--border)',borderRadius:6,height:60,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text3)',fontSize:11,fontFamily:'var(--mono)'}}>Drop here</div>
            )}
          </div>
        </div>;
      })}
    </div>
    <div className="board-legend">
      <span>Location:</span>
      {Object.entries(LOC_COLORS).map(([loc,c])=>(
        <div className="leg-item" key={loc}><div className="leg-dot" style={{background:c}}></div>{loc}</div>
      ))}
    </div>
  </div>;
}

      <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:8}}>
          <span style={{width:7,height:7,borderRadius:'50%',background:'var(--red)',display:'inline-block'}}></span>
          <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)'}}>Out of Scope</span>
        </div>
        <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:9}}>
          {BRD.outOfScope.map((s,i)=><div key={i} style={{display:'flex',gap:10,fontSize:13,color:'var(--text2)',lineHeight:1.5}}>
            <span style={{color:'var(--red)',flexShrink:0,marginTop:1}}>✕</span><span>{s}</span>
          </div>)}
        </div>
      </div>
    </div>

    {/* ── Stakeholders ───────────────────────────────────────── */}
    <BrdBlock label="Stakeholders">
      <table style={{width:'100%',borderCollapse:'collapse',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <thead>
          <tr>{['Role','Name / Group','Responsibility'].map(h=><th key={h} style={{textAlign:'left',fontFamily:'var(--mono)',fontSize:10.5,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.07em',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg3)'}}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {BRD.stakeholders.map((s,i)=>(
            <tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'10px 16px',fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',whiteSpace:'nowrap'}}>{s.role}</td>
              <td style={{padding:'10px 16px',fontSize:13,fontWeight:600}}>{s.name}</td>
              <td style={{padding:'10px 16px',fontSize:12.5,color:'var(--text2)'}}>{s.responsibility}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </BrdBlock>

    {/* ── Success metrics ────────────────────────────────────── */}
    <BrdBlock label="Success Metrics & Acceptance Criteria">
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {BRD.metrics.map((m,i)=>(
          <div key={i} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 16px',display:'flex',gap:12,alignItems:'flex-start'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',background:'var(--amber-d)',border:'1px solid var(--amber)',padding:'1px 6px',borderRadius:3,flexShrink:0,marginTop:1}}>KPI</span>
            <div>
              <div style={{fontSize:12.5,fontWeight:600,marginBottom:3}}>{m.kpi}</div>
              <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{m.target}</div>
            </div>
          </div>
        ))}
      </div>
    </BrdBlock>

    {/* ── Assumptions & Constraints ──────────────────────────── */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:36}}>
      {[['Assumptions',BRD.assumptions,'var(--blue)'],['Constraints',BRD.constraints,'var(--amber)']].map(([title,items,color])=>(
        <div key={title} style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
          <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',color:'var(--text3)'}}>{title}</span>
          </div>
          <div style={{padding:'14px 18px',display:'flex',flexDirection:'column',gap:10}}>
            {items.map((s,i)=>(
              <div key={i} style={{display:'flex',gap:10,fontSize:12.5,color:'var(--text2)',lineHeight:1.55,paddingBottom:10,borderBottom:i<items.length-1?'1px solid var(--border)':'none'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:10,color,flexShrink:0,marginTop:2}}>{String(i+1).padStart(2,'0')}</span>
                <span>{s}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>

    <hr/>

    {/* ── Verticals ──────────────────────────────────────────── */}
    <div style={{marginBottom:32}}><div className="sec-lbl">Five Engineering Verticals</div><h2>One shared platform + four product modules</h2></div>
    <div className="ov-grid">
      {D.verticals.map(v=><div className="ov-card" key={v.id} style={{'--vc':v.color}}>
        <div className="ov-num">{v.team}</div>
        <div className="ov-name" style={{color:v.color}}>{v.name}</div>
        <div className="ov-desc">{v.tagline}</div>
      </div>)}
    </div>

    <hr/>

    {/* ── Platform Objectives ────────────────────────────────── */}
    <div style={{marginBottom:24}}><div className="sec-lbl">Platform Objectives</div><h2>What Forge must achieve</h2></div>
    <table className="obj-tbl">
      <thead><tr><th>Objective</th><th>Priority</th><th>AI</th></tr></thead>
      <tbody>
        {[
          {id:'OBJ-1',text:'Real-time demand intelligence — full lifecycle visible to all stakeholders',priority:'Must',ai:true},
          {id:'OBJ-2',text:'AI-powered talent acquisition — automated resume parsing and semantic scoring',priority:'Must',ai:true},
          {id:'OBJ-3',text:'Semantic workforce allocation — pgvector embedding-based matching',priority:'Must',ai:true},
          {id:'OBJ-4',text:'Intelligent market presence — AI-generated job content, RAG chatbot',priority:'Must',ai:true},
          {id:'OBJ-5',text:'Shared platform foundation — auth, API gateway, Kafka, audit log',priority:'Must',ai:false},
          {id:'OBJ-6',text:'Sub-minute analytics freshness — Kafka-driven real-time dashboards',priority:'Must',ai:false},
          {id:'OBJ-7',text:'Modular, independently deployable architecture — 6 location-pure teams (Chennai, Bangalore, Hyderabad)',priority:'Must',ai:false},
          {id:'OBJ-8',text:'Role-based access — Admin, RM, Recruiter, Hiring Manager, Interviewer, Candidate',priority:'Must',ai:false},
          {id:'OBJ-9',text:'Production-grade CI/CD — GitHub Actions → Docker → K8s',priority:'Must',ai:false},
          {id:'OBJ-10',text:'GDPR-compliant candidate data — consent, deletion, export, audit trail',priority:'Must',ai:false},
        ].map(o=>(
          <tr key={o.id}><td style={{fontSize:13}}>{o.text}</td><td><Badge priority={o.priority} ai={false}/></td><td>{o.ai&&<span className="badge b-ai">AI</span>}</td></tr>
        ))}
      </tbody>
    </table>
  </div>;
}

function Timeline(){
  return <div className="page">
    <div style={{marginBottom:28}}><div className="sec-lbl">Schedule</div><h2>Eight-Week Engineering Timeline</h2></div>
    <div className="tl-grid">
      {D.timeline.map((w,i)=><div className="tl-card" key={w.week}><div className="tl-bar" style={{width:`${(i+1)*12.5}%`}}></div><div className="tl-wk">Week {w.week}</div><div className="tl-phase">{w.phase}</div><div className="tl-focus">{w.focus}</div></div>)}
    </div>
    <hr/>
    <h2>Week 1 Non-Negotiable Protocol</h2>
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:40}}>
      {[
        ['Day 1–2','All 6 teams commit OpenAPI 3.0 specs to /contracts/{team}/. No changes after Day 2 without RFC.'],
        ['Day 3','Team 1 delivers: auth stub, API gateway config, DDL, Kafka catalog, pgvector enabled, AuditLogClient v0.'],
        ['Day 3','Design system v0 published — tokens, 10 components, Storybook URL in #forge-engineering.'],
        ['Day 4+','All teams build against stubs. No team waits for another\'s real implementation.'],
        ['Day 5','Each team presents domain data model in a 30-min shared session to detect schema conflicts.'],
      ].map(([d,t],i)=>(
        <div key={i} style={{display:'flex',gap:14,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:6,padding:'11px 16px',alignItems:'flex-start'}}>
          <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--amber)',minWidth:50,paddingTop:1}}>{d}</span>
          <span style={{fontSize:13,color:'var(--text2)',lineHeight:1.5}}>{t}</span>
        </div>
      ))}
    </div>
  </div>;
}

function Stack(){
  return <div className="page">
    <div style={{marginBottom:28}}><div className="sec-lbl">Engineering Standards</div><h2>Mandatory Tech Stack</h2></div>
    <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',marginBottom:40}}>
      <table className="stack-tbl" style={{width:'100%'}}>
        <thead><tr><th>Layer</th><th>Technology</th><th>Standards</th></tr></thead>
        <tbody>{D.techStack.map(s=><tr key={s.layer}><td className="sl">{s.layer}</td><td className="st">{s.tech}</td><td className="sn">{s.notes}</td></tr>)}</tbody>
      </table>
    </div>
  </div>;
}

const TABS=[
  {key:'overview',label:'Overview'},
  {sep:true},
  {key:'team1',label:'T1 CH · Platform',color:'#f5a623'},
  {key:'team2',label:'T2 CH · Talent Acq',color:'#4fc3f7'},
  {key:'team3',label:'T3 BL · Market Core',color:'#81c784'},
  {key:'team4',label:'T4 BL · AI+Analytics',color:'#ce93d8'},
  {key:'team5',label:'T5 HY · Workforce',color:'#ffb74d'},
  {key:'team6',label:'T6 HY · UI+Skills',color:'#f06292'},
  {sep:true},
  {key:'board',label:'👥 Roster'},
  {key:'timeline',label:'Timeline'},
  {key:'stack',label:'Stack & NFRs'},
];

function App(){
  const [tab,setTab]=useState('overview');
  const [dark,setDark]=useState(true);
  const [announceDismissed,setAnnounceDismissed]=useState(false);
  const ann=D.announcement;

  React.useEffect(()=>{ document.documentElement.setAttribute('data-theme',dark?'dark':'light'); },[dark]);

  const renderTab=()=>{
    switch(tab){
      case 'overview': return <Overview/>;
      case 'team1':    return <TeamPage teamKey="team1" reqKey="team1"/>;
      case 'team2':    return <TeamPage teamKey="team2" reqKey="team2"/>;
      case 'team3':    return <TeamPage teamKey="team3" reqKey="team3"/>;
      case 'team4':    return <TeamPage teamKey="team4" reqKey="team4"/>;
      case 'team5':    return <TeamPage teamKey="team5" reqKey="team5"/>;
      case 'team6':    return <TeamPage teamKey="team6" reqKey="team6"/>;
      case 'board':    return <TeamsBoard/>;
      case 'timeline': return <Timeline/>;
      case 'stack':    return <Stack/>;
    }
  };

  return <>
    <nav className="nav">
      <div className="nav-logo">
        <div className="nav-hex"></div>
        <div className="nav-wordmark">Forge</div>
      </div>
      <div className="nav-tabs">
        {TABS.map((t,i)=>t.sep
          ? <div key={i} className="nav-sep"></div>
          : <div key={t.key} className={`nav-tab ${tab===t.key?'active':''}`} onClick={()=>setTab(t.key)}>
              {t.color&&<div className="nav-pip" style={{background:t.color}}></div>}
              {t.label}
            </div>
        )}
      </div>
      <div className="nav-right">
        <div className="toggle-btn" onClick={()=>setDark(d=>!d)}>
          <span>{dark?'☀':'☾'}</span>
          <div className={`tog-track ${dark?'':'on'}`}><div className="tog-thumb"></div></div>
        </div>
      </div>
    </nav>
    {ann.active&&!announceDismissed&&(
      <div className="announce-bar">
        <span className="announce-icon">📢</span>
        <span className="announce-text">{ann.text}</span>
        <button className="announce-close" onClick={()=>setAnnounceDismissed(true)}>×</button>
      </div>
    )}
    {tab==='overview'&&<div className="hero">
      <div className="hero-dots"></div>
      <div className="hero-glow" style={{background:'#f5a623',top:'-80px',left:'-80px'}}></div>
      <div className="hero-glow" style={{background:'#4fc3f7',bottom:'-80px',right:'200px'}}></div>
      <div className="hero-eyebrow">Grid Dynamics Internship Program Q1 2026</div>
      <div className="hero-h1">Forge<br/><em>AI-Native</em> Workforce<br/>Intelligence</div>
      <div className="hero-sub">Engineering the talent supply chain — intelligently. A production-grade platform built by 30 engineers in 8 weeks across 6 location-pure teams.</div>
    </div>}
    {renderTab()}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
